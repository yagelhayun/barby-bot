name: Deploy Lambda using Terraform

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Lambda dependencies
        working-directory: lambda
        run: npm ci --omit=dev

      - name: Configure AWS credentials (OIDC role assumption)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/Authenticator
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.7.0'

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: >-
          terraform plan
          -var "AWS_REGION=${{ vars.AWS_REGION }}"
          -var "NOTIFICATIONS_BOT_TOKEN=${{ secrets.NOTIFICATIONS_BOT_TOKEN }}"
          -var "ADMIN_BOT_TOKEN=${{ secrets.ADMIN_BOT_TOKEN }}"
          -var "ADMIN_BOT_SECRET_TOKEN=${{ secrets.ADMIN_BOT_SECRET_TOKEN }}"
          -var "HEALTH_CHAT_ID=${{ vars.HEALTH_CHAT_ID }}"
          -var "DATABASE_USER=${{ vars.DATABASE_USER }}"
          -var "DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}"
          -var "DATABASE_HOST=${{ vars.DATABASE_HOST }}"
          -var "DATABASE_PORT=${{ vars.DATABASE_PORT }}"
          -var "DATABASE_NAME=${{ vars.DATABASE_NAME }}"

      - name: Terraform Apply
        run: >-
          terraform apply -auto-approve
          -var "AWS_REGION=${{ vars.AWS_REGION }}"
          -var "NOTIFICATIONS_BOT_TOKEN=${{ secrets.NOTIFICATIONS_BOT_TOKEN }}"
          -var "ADMIN_BOT_TOKEN=${{ secrets.ADMIN_BOT_TOKEN }}"
          -var "ADMIN_BOT_SECRET_TOKEN=${{ secrets.ADMIN_BOT_SECRET_TOKEN }}"
          -var "HEALTH_CHAT_ID=${{ vars.HEALTH_CHAT_ID }}"
          -var "DATABASE_USER=${{ vars.DATABASE_USER }}"
          -var "DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}"
          -var "DATABASE_HOST=${{ vars.DATABASE_HOST }}"
          -var "DATABASE_PORT=${{ vars.DATABASE_PORT }}"
          -var "DATABASE_NAME=${{ vars.DATABASE_NAME }}"
