name: Deploy Lambda using Terraform

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Lambda dependencies
        working-directory: lambda
        run: npm ci

      - name: Configure AWS credentials (OIDC role assumption)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/Authenticator
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configure AWS credentials (assume Authorizer role via role chaining)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/Authorizer
          aws-region: ${{ secrets.AWS_REGION }}
          role-chaining: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.5.0'

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: >-
          terraform apply -auto-approve
          -var "bot_token=${{ secrets.BOT_TOKEN }}"
          -var "events_chat_id=${{ secrets.EVENTS_CHAT_ID }}"
          -var "health_chat_id=${{ secrets.HEALTH_CHAT_ID }}"
