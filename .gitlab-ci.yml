stages:
  - install
  - run

image: node:latest

.cache: &cache
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/
  when: 'on_success'
  policy: push

install:
  stage: install
  script: 
    - npm ci
  rules:
    - changes:
        - package-lock.json
  cache:
    <<: *cache
    policy: push

run:
  stage: run
  script:
    - npm run good
  cache:
    <<: *cache
    policy: pull
